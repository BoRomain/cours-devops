on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.*') }}
      - run: npm ci
      - run: npm run build


  tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        browser: [chrome]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.*') }}

      - uses: cypress-io/github-action@v6
        with:
          start: npm run start
          wait-on: 'http://localhost:3000'


  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.*') }}
      - run: npm ci
      - run: npm run lint